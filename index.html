<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Static Website on AWS S3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #e5e7eb; /* Soft grey background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .card {
            background-color: #ffffff; /* White card */
            padding: 60px 80px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 700px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
            color: #1f2937;
        }

        p {
            font-size: 20px;
            color: #4b5563;
            line-height: 1.6;
        }

        footer {
            margin-top: 30px;
            font-size: 14px;
            color: #6b7280;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🚀 Static Website Hosted on Amazon S3</h1>
        <p>
            Successfully deployed a static website using Amazon S3 (Simple Storage Service)
        </p>
        <footer>
            Deployed on AWS Cloud Infrastructure
        </footer>
    </div>
</body>
</html>
